workspace = { members = ["addonmessage_broker", "dll", "injector", "macros", "shared"], resolver="2" }

[profile.dev]
panic = "abort"
strip = true
opt-level = 0

[profile.dev.package."*"]
opt-level = 3
 
[profile.release]
panic = "unwind"

[profile.release-with-debug]
inherits = "release"
debug = true
strip = false


